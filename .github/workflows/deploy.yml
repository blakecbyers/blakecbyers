name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies for Astro blog
        working-directory: ./blog
        run: npm ci --legacy-peer-deps

      - name: Build Astro blog
        working-directory: ./blog
        run: npm run build

      - name: Prepare Deployment Artifact
        run: |
          mkdir -p public-dist
          # Copy all root files except ignored folders
          find . -maxdepth 1 -type f -exec cp {} public-dist/ \;
          # Create blog directory inside public-dist
          mkdir -p public-dist/blog
          # Copy Astro build output to public-dist/blog
          cp -R blog/dist/* public-dist/blog/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
