<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blake Byers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    .animate-enter {
      animation: enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes jiggle {
      0% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(-5deg);
      }

      50% {
        transform: rotate(5deg);
      }

      75% {
        transform: rotate(-5deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    .jiggle {
      animation: jiggle 0.3s ease-in-out;
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-100 {
      animation-delay: 100ms;
    }

    .delay-200 {
      animation-delay: 200ms;
    }

    .delay-300 {
      animation-delay: 300ms;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 selection:bg-black selection:text-white">

  <!-- Main Container -->
  <main class="w-full max-w-4xl px-4 md:px-8">

    <!-- Header -->
    <header class="mb-16 animate-enter flex flex-col md:flex-row md:items-center gap-6">
      <div
        class="w-20 h-20 md:w-28 md:h-28 rounded-full overflow-hidden border border-gray-100 flex-shrink-0 shadow-sm">
        <img src="pic.png" alt="Blake Byers" class="w-full h-full object-cover">
      </div>
      <div>
        <h1 id="name-title" class="text-3xl md:text-4xl font-semibold mb-2 cursor-pointer inline-block"
          onclick="jiggleName()">Blake Byers</h1>
        <p class="text-xl text-gray-500 font-normal">
          AZ/OK
        </p>
      </div>
    </header>

    <!-- Projects List -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Blog -->
      <a href="blog/" aria-label="Blog" onmousedown="if(navigator.vibrate) navigator.vibrate(10)"
        class="group block p-6 rounded-2xl border border-gray-100 hover:border-gray-200 hover:bg-gray-50 transition-all duration-300 animate-enter delay-300">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-xl font-medium text-black group-hover:text-black transition-colors mb-1">
              Blog
            </h3>
            <p class="text-gray-500 text-sm leading-relaxed max-w-sm">
              Blake's posts and thoughts.
            </p>
          </div>
          <div
            class="w-10 h-10 rounded-full bg-gray-50 group-hover:bg-white border border-gray-100 flex items-center justify-center transition-all group-hover:scale-105 group-hover:shadow-sm">
            <i data-lucide="pen-tool" class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors"></i>
          </div>
        </div>
      </a>



    </div>

    <!-- Footer -->
    <footer
      class="mt-20 border-t border-gray-100 pt-8 flex justify-between items-center text-sm animate-enter delay-300">
      <span class="text-gray-400">© 2026</span>
      <div class="flex gap-6">
        <a href="https://x.com/blakecbyers" class="text-gray-400 hover:text-black transition-colors">X</a>
        <a href="mailto:blakecbyers@gmail.com" class="text-gray-400 hover:text-black transition-colors">Email</a>
      </div>
    </footer>

  </main>

  <!-- Scripts: Lucide must load before createIcons() -->
  <script src="https://unpkg.com/lucide@latest" onload="lucide.createIcons()"></script>
  <script type="module" src="haptics.js"></script>
  <script>
    /* Jiggle Logic */
    function jiggleName() {
      const nameEl = document.getElementById('name-title');
      nameEl.classList.remove('jiggle');
      void nameEl.offsetWidth; // trigger reflow
      nameEl.classList.add('jiggle');

      if (window.haptics) window.haptics.trigger('selection');
      if (navigator.vibrate) navigator.vibrate(10);
    }

  </script>
</body>

</html>
