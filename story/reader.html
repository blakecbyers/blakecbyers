<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reading... — Micro-Wiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--main-font);
      background: #fafaf9;
      color: #171717;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .article-container {
      position: relative;
      max-width: 680px;
      margin: 0 auto;
      padding-bottom: 20vh;
      min-height: 80vh;
    }

    #text-canvas {
      width: 100%;
      height: auto;
      display: block;
      cursor: default;
    }

    /* The Draggable Fidget Icon */
    .fidget-icon {
      position: absolute;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      cursor: grab;
      z-index: 50;
      color: #404040;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      user-select: none;
      touch-action: none;
    }

    .fidget-icon:active {
      cursor: grabbing;
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .lottie-container {
      position: absolute;
      pointer-events: none;
      z-index: 40;
      width: 120px;
      height: 120px;
      transform: translate(-50%, -50%);
    }

    .read-success {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .read-success.visible {
      opacity: 1;
      transform: none;
    }
  </style>
</head>
<body class="min-h-screen">

  <nav class="sticky top-0 z-40 bg-[#fafaf9]/90 backdrop-blur-md border-b border-neutral-200/50">
    <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="text-neutral-500 hover:text-neutral-900 transition-colors text-sm font-medium flex items-center gap-2">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Wiki
      </a>
      <div id="status-badge" class="px-3 py-1 bg-neutral-100 text-neutral-500 rounded-full text-xs font-semibold flex items-center gap-1 opacity-0 transition-opacity">
        <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> Read
      </div>
    </div>
  </nav>

  <main class="w-full max-w-4xl mx-auto px-6 pt-12">
    <header class="mb-12 max-w-[680px] mx-auto">
      <h1 id="story-title" class="text-4xl md:text-5xl font-bold tracking-tight text-neutral-900 mb-4" style="font-family: 'DM Serif Display', serif;">
        Loading...
      </h1>
      <p id="story-meta" class="text-neutral-400 font-medium tracking-wide">
        Public Domain · Reading
      </p>
    </header>

    <div class="article-container" id="article">
      <!-- The Draggable Icon -->
      <div class="fidget-icon" id="fidget-icon">
        <i id="fidget-svg" data-lucide="star" class="w-6 h-6"></i>
      </div>

      <!-- Canvas for Pretext Text Rendering -->
      <canvas id="text-canvas"></canvas>
      
      <div id="end-marker" class="h-20 w-full mt-12 flex items-center justify-center">
        <div class="read-success flex flex-col items-center text-green-600">
          <i data-lucide="check-circle-2" class="w-10 h-10 mb-2"></i>
          <span class="font-medium text-sm">Story marked as read</span>
        </div>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script type="module">
    import { prepareWithSegments, layoutNextLineRange, materializeLineRange } from 'https://esm.sh/@chenglou/pretext';

    document.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(window.location.search);
      const storyId = params.get('id');
      const story = STORY_DATA.find(s => s.id === storyId);

      if (!story) {
        document.getElementById('story-title').textContent = "Story not found";
        return;
      }

      // Populate Meta
      document.title = `${story.title} — Micro-Wiki`;
      document.getElementById('story-title').textContent = story.title;
      document.getElementById('fidget-svg').setAttribute('data-lucide', story.iconName);
      lucide.createIcons();

      // UI References
      const canvas = document.getElementById('text-canvas');
      const ctx = canvas.getContext('2d');
      const article = document.getElementById('article');
      const icon = document.getElementById('fidget-icon');

      // Font Configuration
      const fontSize = 18;
      const lineHeight = 32;
      const font = `400 ${fontSize}px Inter`;
      
      // Wait for font to be ready (critical for Pretext measurement)
      await document.fonts.load(font);

      // Prepare Text Content
      const cleanContent = story.content.replace(/\r/g, '').trim();
      const preparedText = prepareWithSegments(cleanContent, font);

      // Fidget State
      let iconX = window.innerWidth / 2 || 300; // start middle
      let iconY = 100;
      let isDragging = false;
      let startX, startY, startIconX, startIconY;
      const iconRadius = 40; 
      const wrapPadding = 35; // increased padding to ensure no clipping

      const getShapeConstraints = (y, baseWidth, shape) => {
        let xOffset = 0;
        let lineWidth = baseWidth;
        const R = baseWidth / 2;
        let wFactor = 1.0;

        if (shape === 'snake') {
          const P = 700; const t = (y % P) / P;
          lineWidth = Math.max(80, baseWidth * 0.4);
          xOffset = R - lineWidth / 2 + Math.sin(t * Math.PI * 2) * (baseWidth * 0.25);
          return { shapeXOffset: xOffset, shapeLineWidth: lineWidth };
        } 
        
        if (shape === 'spider') {
          const P = 800; const t = (y % P) / P;
          if (t < 0.3) {
            const localT = (t - 0.15) / 0.15;
            wFactor = 0.3 * Math.sqrt(Math.max(0, 1 - localT*localT));
          } else {
            const localT = (t - 0.65) / 0.35;
            wFactor = 0.9 * Math.sqrt(Math.max(0, 1 - localT*localT));
          }
        } 
        else if (shape === 'fish') {
          const P = 900; const t = (y % P) / P;
          if (t < 0.05) wFactor = t / 0.05 * 0.3 + 0.1;
          else if (t < 0.4) wFactor = 0.4 + Math.sin((t-0.05)/0.35 * Math.PI) * 0.5;
          else if (t < 0.8) wFactor = 0.4 - ((t-0.4)/0.4) * 0.25;
          else wFactor = 0.15 + ((t-0.8)/0.2) * 0.6;
        } 
        else if (shape === 'bat') {
          const P = 800; const t = (y % P) / P;
          if (t < 0.3) wFactor = 1.0 - (t/0.3) * 0.7;
          else if (t < 0.8) {
            const bodyT = (t - 0.55) / 0.25;
            wFactor = 0.3 + Math.sqrt(Math.max(0, 1 - bodyT*bodyT)) * 0.2;
          }
          else wFactor = 0.3 - ((t-0.8)/0.2) * 0.2;
        } 
        else if (shape === 'scarab') {
          const P = 800; const t = (y % P) / P;
          if (t < 0.15) {
            const headT = (t - 0.15) / 0.15;
            wFactor = 0.1 + Math.sqrt(Math.max(0, 1 - headT*headT)) * 0.3;
          } else {
            const bodyT = (t - 0.575) / 0.425;
            wFactor = 0.85 * Math.sqrt(Math.max(0, 1 - bodyT*bodyT));
          }
        }
        else if (shape === 'bottle') {
          const P = 700; const t = (y % P) / P;
          if (t < 0.3) wFactor = 0.25;
          else if (t < 0.4) wFactor = 0.25 + ((t-0.3)/0.1) * 0.45;
          else if (t < 0.95) wFactor = 0.7;
          else wFactor = 0.7 - ((t-0.95)/0.05) * 0.2;
        }
        else if (shape === 'diamond') {
          const P = 600; const t = (y % P) / P;
          const dy = Math.abs(0.5 - t) / 0.5;
          wFactor = 0.9 * (1 - dy);
        }
        else if (shape === 'urn') {
          const P = 600; const t = (y % P) / P;
          if (t < 0.1) wFactor = 0.4;
          else if (t < 0.2) wFactor = 0.25;
          else if (t < 0.7) {
            const bodyT = (t - 0.45) / 0.25;
            wFactor = 0.85 * Math.sqrt(Math.max(0, 1 - bodyT*bodyT));
          }
          else wFactor = 0.4;
        }

        lineWidth = Math.max(50, baseWidth * wFactor);
        xOffset = R - lineWidth / 2;
        return { shapeXOffset: xOffset, shapeLineWidth: lineWidth };
      };

      const updateCanvasSize = () => {
        const dpr = window.devicePixelRatio || 1;
        const rect = article.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.style.width = `${rect.width}px`;
        draw();
      };

      const draw = () => {
        const dpr = window.devicePixelRatio || 1;
        const width = article.offsetWidth;
        if (width === 0) return;

        // Pass 1: Measure Total Height
        let cursor = { segmentIndex: 0, graphemeIndex: 0 };
        let yTotal = 0;
        while (true) {
          const currentY = yTotal + lineHeight / 2;
          const dy = Math.abs(currentY - iconY);
          
          const { shapeXOffset, shapeLineWidth } = getShapeConstraints(currentY, width, story.layoutShape);
          let xOffset = shapeXOffset;
          let lineWidth = shapeLineWidth;

          if (dy < iconRadius + wrapPadding) {
            const wrapW = Math.sqrt(Math.pow(iconRadius + wrapPadding, 2) - Math.pow(dy, 2));
            const leftSpace = iconX - wrapW - xOffset;
            const rightSpace = (xOffset + lineWidth) - (iconX + wrapW);
            
            if (leftSpace > rightSpace) {
              lineWidth = leftSpace;
            } else {
              xOffset = iconX + wrapW;
              lineWidth = rightSpace;
            }
            lineWidth = Math.max(10, lineWidth);
          }

          const range = layoutNextLineRange(preparedText, cursor, lineWidth);
          if (range === null) break;
          cursor = range.end;
          yTotal += lineHeight;
        }

        const totalHeight = Math.max(400, yTotal + 80);
        canvas.height = totalHeight * dpr;
        canvas.style.height = `${totalHeight}px`;

        // Pass 2: Draw
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, width, totalHeight);
        ctx.font = font;
        ctx.fillStyle = '#404040';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        cursor = { segmentIndex: 0, graphemeIndex: 0 };
        let yDraw = lineHeight / 2;

        while (true) {
          const currentY = yDraw;
          const dy = Math.abs(currentY - iconY);
          
          const { shapeXOffset, shapeLineWidth } = getShapeConstraints(currentY, width, story.layoutShape);
          let xOffset = shapeXOffset;
          let lineWidth = shapeLineWidth;

          if (dy < iconRadius + wrapPadding) {
            const wrapW = Math.sqrt(Math.pow(iconRadius + wrapPadding, 2) - Math.pow(dy, 2));
            const leftSpace = iconX - wrapW - xOffset;
            const rightSpace = (xOffset + lineWidth) - (iconX + wrapW);

            if (leftSpace > rightSpace) {
               lineWidth = leftSpace;
            } else {
               xOffset = iconX + wrapW;
               lineWidth = rightSpace;
            }
            lineWidth = Math.max(10, lineWidth);
          }

          const range = layoutNextLineRange(preparedText, cursor, lineWidth);
          if (range === null) break;
          
          const line = materializeLineRange(preparedText, range);
          ctx.fillText(line.text, xOffset + lineWidth / 2, yDraw);
          
          cursor = range.end;
          yDraw += lineHeight;
        }

        // Update icon position
        icon.style.transform = `translate(${iconX - iconRadius}px, ${iconY - iconRadius}px) scale(${isDragging ? 1.1 : 1})`;
      };

      const onStart = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = article.getBoundingClientRect();
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;

        const dist = Math.sqrt(Math.pow(mouseX - iconX, 2) + Math.pow(mouseY - iconY, 2));
        if (dist < iconRadius) {
          isDragging = true;
          startX = clientX;
          startY = clientY;
          startIconX = iconX;
          startIconY = iconY;
          playHapticLottie(iconX, iconY);
          e.preventDefault();
        }
      };

      const onMove = (e) => {
        if (!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const deltaX = clientX - startX;
        const deltaY = clientY - startY;

        iconX = Math.max(iconRadius, Math.min(article.offsetWidth - iconRadius, startIconX + deltaX));
        iconY = Math.max(iconRadius, Math.min(canvas.offsetHeight - iconRadius, startIconY + deltaY));
        
        draw();
      };

      const onEnd = () => {
        if (isDragging) {
          isDragging = false;
          playHapticLottie(iconX, iconY);
          draw();
        }
      };

      window.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); onMove(e); }, { passive: false });
      window.addEventListener('touchend', onEnd);
      window.addEventListener('resize', updateCanvasSize);

      updateCanvasSize();

      // Ripple & Haptics
      const createRippleJSON = () => ({
        "v": "5.7.4", "fr": 60, "ip": 0, "op": 30, "w": 200, "h": 200, "nm": "Ripple",
        "layers": [{
          "ty": 4, "ks": {
            "o": { "a": 1, "k": [{ "t": 0, "s": [100] }, { "t": 30, "s": [0] }] },
            "s": { "a": 1, "k": [{ "t": 0, "s": [0,0,100] }, { "t": 30, "s": [100,100,100] }] },
            "p": { "a": 0, "k": [100, 100, 0] }
          },
          "shapes": [
            { "ty": "el", "p": { "a": 0, "k": [0, 0] }, "s": { "a": 0, "k": [150, 150] } },
            { "ty": "st", "c": { "a": 0, "k": [0.3, 0.3, 0.3, 1] }, "o": { "a": 0, "k": 100 }, "w": { "a": 0, "k": 4 } }
          ]
        }]
      });

      const playHapticLottie = (x, y) => {
        if (window.haptics) {
          window.haptics.trigger('medium');
        } else if (navigator.vibrate) {
          navigator.vibrate(10);
        }
        const container = document.createElement('div');
        container.className = 'lottie-container';
        container.style.left = `${x}px`;
        container.style.top = `${y}px`;
        article.appendChild(container);
        const anim = lottie.loadAnimation({
          container, renderer: 'svg', loop: false, autoplay: true, animationData: createRippleJSON()
        });
        anim.addEventListener('complete', () => { anim.destroy(); container.remove(); });
      };

      // Read Tracking
      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          const readStorage = JSON.parse(localStorage.getItem('stories_read') || '{}');
          if (!readStorage[storyId]) {
            readStorage[storyId] = Date.now();
            localStorage.setItem('stories_read', JSON.stringify(readStorage));
            document.getElementById('status-badge').classList.remove('opacity-0');
            document.querySelector('.read-success').classList.add('visible');
            if (navigator.vibrate) navigator.vibrate([10, 50, 20]);
            playHapticLottie(article.offsetWidth / 2, article.offsetHeight - 80);
          }
        }
      }, { threshold: 0.5 });
      observer.observe(document.getElementById('end-marker'));

      const readData = JSON.parse(localStorage.getItem('stories_read') || '{}');
      if (readData[storyId]) {
        document.getElementById('status-badge').classList.remove('opacity-0');
        document.querySelector('.read-success').classList.add('visible');
      }
    });
  </script>
  <script type="module" src="../haptics.js"></script>
</body>
</html>
