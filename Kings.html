 his alliance with Ahab's house."},{id:"jehoram-j",name:"Jehoram",start:848,end:841,score:15,kingdom:"judah",summary:"Married Athaliah, murdered his brothers and led Judah into Baal worship. He died unmourned of a painful disease, as Elijah's letter foretold."},{id:"ahaziah-j",name:"Ahaziah",start:841,end:841,score:20,kingdom:"judah",summary:"Reigned a single year under his mother's influence. He was killed by Jehu during the purge of Ahab's house."},{id:"athaliah",name:"Athaliah",start:841,end:835,score:5,kingdom:"judah",summary:"Usurper queen and daughter of Ahab. She massacred the royal line; only the infant Joash survived, hidden in the temple."},{id:"joash",name:"Joash",start:835,end:796,score:65,kingdom:"judah",summary:"Crowned at age seven after years hidden in the temple. He repaired the house of God, but turned to idols after the priest Jehoiada died."},{id:"amaziah",name:"Amaziah",start:796,end:767,score:60,kingdom:"judah",summary:"Did what was right, but not wholeheartedly. After defeating Edom he brought back its gods and worshiped them."},{id:"uzziah",name:"Uzziah",start:792,end:740,score:65,kingdom:"judah",summary:"A long, prosperous reign of building and military strength. Pride led him to burn incense in the temple, and he lived out his days a leper."},{id:"jotham",name:"Jotham",start:750,end:735,score:78,kingdom:"judah",summary:"Grew powerful because he walked steadfastly before the LORD. He built extensively, though the high places remained."},{id:"ahaz",name:"Ahaz",start:735,end:715,score:8,kingdom:"judah",summary:"Sacrificed his own son, copied a pagan altar from Damascus and shut the doors of the temple. Isaiah's appeals went unheeded."},{id:"hezekiah",name:"Hezekiah",start:715,end:686,score:95,kingdom:"judah",summary:"Led sweeping reforms, reopened the temple and trusted God against Sennacherib's siege. The angel of the LORD delivered Jerusalem in his day."},{id:"manasseh",name:"Manasseh",start:697,end:642,score:12,kingdom:"judah",summary:"Judah's most wicked king, who filled Jerusalem with innocent blood. He repented in Babylonian captivity, but the damage shaped Judah's fate."},{id:"josiah",name:"Josiah",start:640,end:609,score:98,kingdom:"judah",summary:"The Book of the Law was found during his temple repairs, sparking Judah's last great reformation. He died at Megiddo opposing Pharaoh Neco."},{id:"jehoiakim",name:"Jehoiakim",start:609,end:598,score:12,kingdom:"judah",summary:"Burned Jeremiah's scroll column by column and rebelled against Babylon, hastening Judah's end."},{id:"zedekiah",name:"Zedekiah",start:597,end:586,score:15,kingdom:"judah",summary:"Judah's last king. His rebellion brought Nebuchadnezzar's final siege; Jerusalem and the temple fell in 586 BC."},{id:"jeroboam1",name:"Jeroboam I",start:930,end:910,score:10,kingdom:"israel",summary:"Set golden calves at Bethel and Dan so the north would not worship in Jerusalem. This became the defining sin of every northern king."},{id:"nadab",name:"Nadab",start:910,end:909,score:10,kingdom:"israel",summary:"Walked in his father's way and was assassinated by Baasha while besieging Gibbethon."},{id:"baasha",name:"Baasha",start:909,end:886,score:10,kingdom:"israel",summary:"Wiped out Jeroboam's entire house as prophesied, then repeated the very sins that doomed it."},{id:"elah",name:"Elah",start:886,end:885,score:10,kingdom:"israel",summary:"Killed while drinking himself drunk by Zimri, the commander of half his chariots."},{id:"zimri",name:"Zimri",start:885,end:885,score:10,kingdom:"israel",summary:"A seven day reign, the shortest in Israel's history. Besieged in Tirzah, he burned the palace down over himself."},{id:"omri",name:"Omri",start:885,end:874,score:15,kingdom:"israel",summary:"Founded Samaria and built a dynasty respected abroad. Politically formidable, spiritually worse than all before him."},{id:"ahab",name:"Ahab",start:874,end:853,score:5,kingdom:"israel",summary:"With Jezebel he made Baal worship the state religion. Elijah confronted him at Carmel and over Naboth's vineyard."},{id:"ahaziah-i",name:"Ahaziah",start:853,end:852,score:10,kingdom:"israel",summary:"After falling through a lattice he consulted Baal-zebub of Ekron. Elijah pronounced his death sentence."},{id:"joram",name:"Joram",start:852,end:841,score:25,kingdom:"israel",summary:"Removed Baal's sacred pillar yet clung to the golden calves. Jehu's arrow ended his reign at Naboth's field."},{id:"jehu",name:"Jehu",start:841,end:814,score:50,kingdom:"israel",summary:"Destroyed Ahab's house and eradicated Baal worship in a furious purge, but kept the calves of Bethel and Dan."},{id:"jehoahaz",name:"Jehoahaz",start:814,end:798,score:20,kingdom:"israel",summary:"Israel was ground down under Aramean oppression until only a token army remained."},{id:"jehoash",name:"Jehoash",start:798,end:782,score:25,kingdom:"israel",summary:"Recovered cities from Aram as Elisha foretold from his deathbed, and defeated Amaziah of Judah."},{id:"jeroboam2",name:"Jeroboam II",start:782,end:753,score:25,kingdom:"israel",summary:"Restored Israel's borders amid a long economic boom. Amos and Hosea condemned the era's injustice and hollow religion."},{id:"zechariah-k",name:"Zechariah",start:753,end:753,score:10,kingdom:"israel",summary:"Six months on the throne before assassination ended Jehu's dynasty, exactly four generations as God had promised."},{id:"shallum",name:"Shallum",start:752.5,end:752.5,score:10,kingdom:"israel",summary:"Reigned one month in Samaria before Menahem struck him down."},{id:"menahem",name:"Menahem",start:752,end:742,score:10,kingdom:"israel",summary:"A brutal reign that bought survival with heavy tribute to Tiglath-pileser of Assyria, extracted from Israel's wealthy."},{id:"pekahiah",name:"Pekahiah",start:742,end:740,score:10,kingdom:"israel",summary:"Assassinated in his own citadel by Pekah, one of his chief officers."},{id:"pekah",name:"Pekah",start:740,end:732,score:15,kingdom:"israel",summary:"Allied with Aram against Judah. Tiglath-pileser III stripped away Galilee and Gilead and carried the people into exile."},{id:"hoshea",name:"Hoshea",start:732,end:722,score:30,kingdom:"israel",summary:"Israel's last king. His intrigue with Egypt provoked Assyria; Samaria fell in 722 BC and the northern kingdom ended."}],Ep=[{id:"samuel",name:"Samuel",start:1050,end:1010,summary:"The last judge and first of the great prophets. He anointed both Saul and David and established the prophetic office in Israel."},{id:"gad",name:"Gad",start:1010,end:990,summary:"David's seer, who counseled him during his flight from Saul and confronted him after the census."},{id:"nathan",name:"Nathan",start:1e3,end:960,summary:"Confronted David over Bathsheba with the parable of the ewe lamb, and later secured Solomon's succession."},{id:"shemaiah",name:"Shemaiah",start:930,end:913,summary:"Stopped Rehoboam from waging civil war against the breakaway northern tribes."},{id:"ahijah",name:"Ahijah",start:935,end:909,summary:"Tore his cloak into twelve pieces to foretell the kingdom's division, then later pronounced doom on Jeroboam's house."},{id:"jehu-prophet",name:"Jehu son of Hanani",start:895,end:870,summary:"Pronounced judgment on Baasha's dynasty and later rebuked Jehoshaphat for helping the wicked."},{id:"elijah",name:"Elijah",start:875,end:848,summary:"Confronted Ahab and the prophets of Baal on Mount Carmel. He was taken to heaven in a whirlwind, leaving his mantle to Elisha."},{id:"micaiah",name:"Micaiah",start:860,end:850,summary:"The lone true voice among four hundred court prophets before Ahab's final battle at Ramoth-gilead."},{id:"elisha",name:"Elisha",start:850,end:795,summary:"Elijah's successor with a double portion of his spirit. His miracles spanned four reigns, from healing Naaman to raising the dead."},{id:"jonah",name:"Jonah",start:785,end:760,summary:"Foretold Jeroboam II's expansion, then was sent to Nineveh, where his reluctant preaching brought a whole city to repentance."},{id:"amos",name:"Amos",start:765,end:750,summary:"A shepherd from Tekoa sent north to condemn complacent prosperity. Let justice roll on like a river."},{id:"hosea",name:"Hosea",start:755,end:720,summary:"His marriage to unfaithful Gomer embodied God's covenant love for wayward Israel right up to Samaria's fall."},{id:"isaiah",name:"Isaiah",start:740,end:681,summary:"Counseled Ahaz and Hezekiah through Assyria's rise. His visions span judgment, comfort and the coming King."},{id:"micah",name:"Micah",start:737,end:690,summary:"Foretold both Jerusalem's fall and a ruler from Bethlehem. Act justly, love mercy, walk humbly with your God."},{id:"zephaniah",name:"Zephaniah",start:640,end:625,summary:"Announced the great day of the LORD during Josiah's early reign, likely helping spark the reformation."},{id:"jeremiah",name:"Jeremiah",start:627,end:585,summary:"The weeping prophet who watched Jerusalem fall after forty years of unheeded warnings, yet promised a new covenant."},{id:"habakkuk",name:"Habakkuk",start:610,end:598,summary:"Questioned how God could use Babylon to judge Judah, and received the answer: the righteous shall live by faith."},{id:"ezekiel",name:"Ezekiel",start:593,end:571,summary:"Priest and prophet among the exiles by the Kebar River. He saw God's glory depart the temple, and promised it would return."}],Op=[{year:930,label:"Kingdom divides"},{year:722,label:"Samaria falls to Assyria"},{year:586,label:"Jerusalem falls to Babylon"}],Wl={united:{label:"United Monarchy",short:"United"},judah:{label:"Judah (Southern)",short:"Judah"},israel:{label:"Israel (Northern)",short:"Israel"},prophets:{label:"Prophets",short:"Prophets"}},cn=1060,af=560,gr=6,Up=16,lf=14,of=20,tf=lf+of+14,zp=12,Lr=e=>(cn-e)*gr,Np=(e,a)=>Math.max((e-a)*gr,Up),Ea=e=>Number.isInteger(e)?e:Math.floor(e),mn=e=>Ea(e.start)===Ea(e.end)?`${Ea(e.start)} BC`:`${Ea(e.start)}\u2013${Ea(e.end)} BC`;function Re(e){return`hsl(${4+e*1.4}, 76%, 47%)`}function uf(e){return e>=80?"Faithful":e>=55?"Mostly faithful":e>=30?"Compromised":"Unfa
